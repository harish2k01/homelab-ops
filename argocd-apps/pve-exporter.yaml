apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pve-exporter
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://harish2k01.github.io/helm-charts
      chart: pve-exporter
      targetRevision: 0.1.0
      helm:
        releaseName: pve-exporter
        valueFiles:
          - $values/charts/pve-exporter/values.yaml
    - repoURL: https://github.com/harish2k01/homelab-ops
      targetRevision: main
      ref: values
    - repoURL: https://github.com/harish2k01/homelab-ops
      targetRevision: main
      path: infra/pve-exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
