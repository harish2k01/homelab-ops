apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gh-runner-scale-set-controller
  namespace: argocd

spec:
  project: default

  sources:
    # 🔹 Upstream Helm chart
    - repoURL: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
      targetRevision: 0.14.0
      path: .
      helm:
        releaseName: arc
        valueFiles:
          - $values/charts/actions-runner-controller/gha-runner-scale-set-controller/values.yaml

    # 🔹 Your Git repo (values source)
    - repoURL: https://github.com/harish2k01/homelab-ops
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  revisionHistoryLimit: 3
