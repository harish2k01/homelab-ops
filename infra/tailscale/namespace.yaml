apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  labels:
    # Tailscale subnet-router/exit-node mode needs /dev/net/tun, NET_ADMIN,
    # NET_RAW, and a privileged init container for packet forwarding.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
