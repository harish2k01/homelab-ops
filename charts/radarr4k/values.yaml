podSecurityContext:
  fsGroup: 1000

env:
  PUID: "1000"
  PGID: "1000"
  TZ: Asia/Kolkata

persistence:
  config:
    enabled: true
    size: 512Mi
    storageClassName: nfs-csi

media:
  enabled: true
  existingClaim: media-vault-pvc
  mountPath: /vault
  readOnly: false

httpRoute:
  enabled: true
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - radarr-4k.k8s.harish2k01.xyz

resources: {}

