image:
  repository: ghcr.io/analogj/scrutiny
  tag: v0.9.2-web
  pullPolicy: IfNotPresent

service:
  port: 8080

scrutiny:
  truenas:
    host: 10.10.10.104
    user: truenas_admin
    port: 22

ssh:
  existingSecret: scrutiny-ssh-key

ingress:
  enabled: false
  className: traefik
  host: scrutiny.local

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - scrutiny.k8s.harish2k01.xyz

resources: {}

probes:
  enabled: true