image:
  repository: ghcr.io/analogj/scrutiny
  tag: v0.9.2-web
  pullPolicy: IfNotPresent

influxdb:
  image:
    repository: influxdb
    tag: "2.8"
    pullPolicy: IfNotPresent
  resources: {}

service:
  port: 8080

scrutiny:
  web:
    basepath: ""
    database:
      location: /opt/scrutiny/config/scrutiny.db
    influxdb:
      scheme: http
      host: 127.0.0.1
      port: 8086
      retentionPolicy: true
  log:
    file: ""
    level: INFO
  notify:
    urls: []

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClassName: longhorn
  scrutiny:
    size: 1Gi
  influxdb:
    size: 2Gi

ingress:
  enabled: false
  className: traefik
  annotations: {}
  host: scrutiny.local

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - scrutiny.k8s.harish2k01.xyz

resources: {}

probes:
  enabled: true
