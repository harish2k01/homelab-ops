image:
  repository: prompve/prometheus-pve-exporter
  tag: "3.8.2"

proxmox:
  # Legacy single-target value. Kept for backward compatibility.
  host: 10.10.10.100
  # One or more Proxmox API endpoints to scrape.
  # If set, this list is used instead of proxmox.host.
  targets:
    - 10.10.10.100
    - 10.10.10.150

service:
  port: 9221

servicemonitor:
  enabled: true
  interval: 15s
  labels:
    release: kube-prometheus-stack

sealedSecret:
  enabled: true
  encryptedData:
    pveyaml: ""
