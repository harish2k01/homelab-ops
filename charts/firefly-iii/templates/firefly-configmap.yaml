apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "firefly-iii.fullname" . }}
  labels:
    {{- include "firefly-iii.labels" . | nindent 4 }}
data:
  DB_CONNECTION: "pgsql"
  DB_HOST: {{ include "firefly-iii.postgresServiceName" . | quote }}
  DB_PORT: {{ .Values.postgres.service.port | quote }}
  DB_DATABASE: {{ .Values.postgres.auth.database | quote }}
  DB_USERNAME: {{ .Values.postgres.auth.username | quote }}
{{- range $key, $value := .Values.firefly.env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
