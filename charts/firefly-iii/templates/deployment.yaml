apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "firefly-iii.fullname" . }}
  labels:
    {{- include "firefly-iii.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "firefly-iii.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/firefly-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/firefly-secret.yaml") . | sha256sum }}
        checksum/secret-source: {{ printf "%s:%s" (include "firefly-iii.fireflySecretName" .) (.Values.firefly.secrets.rolloutToken | default "") | sha256sum }}
        {{- with .Values.firefly.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "firefly-iii.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.firefly.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do sleep 2; done
          env:
            - name: PGHOST
              value: {{ include "firefly-iii.postgresServiceName" . | quote }}
            - name: PGPORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.auth.database | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "firefly-iii.fireflySecretName" . }}
                  key: DB_PASSWORD
      containers:
        - name: firefly-iii
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.firefly.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "firefly-iii.fullname" . }}
            - secretRef:
                name: {{ include "firefly-iii.fireflySecretName" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- with .Values.firefly.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.firefly.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.firefly.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.firefly.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: upload
              mountPath: /var/www/html/storage/upload
      volumes:
        - name: upload
          {{- if .Values.persistence.upload.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-upload" (include "firefly-iii.fullname" .)) .Values.persistence.upload.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.firefly.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.firefly.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.firefly.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
