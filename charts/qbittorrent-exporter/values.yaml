replicaCount: 1

image:
  repository: ghcr.io/martabal/qbittorrent-exporter
  tag: "v2.0.1"
  pullPolicy: IfNotPresent

qbittorrent:
  baseUrl: http://qbittorrent.media.svc.cluster.local:8080
  auth:
    # qBittorrent 5.2.0+ requires auth.method=apiKey and an api-key entry in
    # the existing Secret.
    method: apiKey
    existingSecret: qbittorrent-exporter-auth-secret
    usernameSecretKey: username
    passwordSecretKey: password
    apiKeySecretKey: api-key

service:
  type: ClusterIP
  port: 8090
  targetPort: 8090

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  labels:
    release: kube-prometheus-stack

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
