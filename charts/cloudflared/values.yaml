# Homelab override for the published cloudflared chart.
replicaCount: 2

fullnameOverride: cloudflared-deployment

image:
  repository: cloudflare/cloudflared
  # Pinned to a versioned tag so Renovate can raise image update PRs.
  tag: "2026.3.0"
  pullPolicy: IfNotPresent

selectorLabels:
  pod: cloudflared

token:
  secretName: cloudflare-tunnel-token
  secretKey: token
  create: false
  sealedSecret:
    enabled: true
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
    encryptedData:
      token: 

cloudflared:
  logLevel: info
  noAutoupdate: true
  metrics:
    enabled: true
    address: 0.0.0.0:2000
    port: 2000

livenessProbe:
  httpGet:
    path: /ready
    port: metrics
  failureThreshold: 1
  initialDelaySeconds: 10
  periodSeconds: 10

# Keep the two cloudflared connectors in separate zones. If the cluster does not
# have two eligible zones, the second pod will remain Pending instead of
# colocating.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        pod: cloudflared
