# Homelab override for the published tailscale chart. This deploys Tailscale
# router pods without the Tailscale Kubernetes operator.
replicaCount: 2

image:
  repository: tailscale/tailscale
  # Pinned to a versioned tag so Renovate can raise image update PRs.
  tag: "v1.96.5"
  pullPolicy: IfNotPresent

# Store the auth key in a Sealed Secret or manually created Secret named below.
# The chart persists state, so TS_AUTH_ONCE keeps the pod from reauthenticating
# on every restart after the first successful login.
authKey:
  existingSecret: tailscale-auth-secret
  existingSecretKey: TS_AUTHKEY
  create: false

tailscale:
  hostnameFromPodName: true
  hostnamePrefix: homelab-
  # Keep this as a subnet router only. Exit-node mode routes all client Internet
  # traffic through the pod and can break connectivity if cluster egress/UDP is flaky.
  advertiseExitNode: false
  routes:
    - 10.10.10.0/24
  userspace: false
  authOnce: true
  acceptDns: false
  extraEnv:
    # The pod's legacy iptables path is failing to create filter/nat tables.
    # Let Tailscale choose nftables when the kernel supports it.
    TS_DEBUG_FIREWALL_MODE: auto

persistence:
  enabled: true
  size: 512Mi
  storageClassName: longhorn-safe

service:
  enabled: true
  type: ClusterIP
  port: 9002
  targetPort: 9002
  portName: http

resources: {}

# Keep the two Tailscale routers in separate zones. If the cluster does not have
# two eligible zones, the second pod will remain Pending instead of colocating.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: tailscale
        app.kubernetes.io/instance: tailscale
